<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Visualizzatore Errori</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 20px;
    }

    select, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        font-size: 16px;
    }

    textarea {
        height: 150px;
        resize: vertical;
        overflow-y: scroll;
    }
</style>
</head>

<body>

<h2>Visualizzatore Errori da Excel</h2>

<!-- Caricamento file Excel -->
<label>Carica il file errori.xlsx:</label>
<input type="file" id="fileInput" accept=".xlsx">

<!-- Campo 1 con tendina -->
<label id="labelA"></label>
<select id="selectA"></select>

<!-- Campi testo -->
<label id="labelB"></label>
<textarea id="textB" readonly></textarea>

<label id="labelC"></label>
<textarea id="textC" readonly></textarea>

<label id="labelD"></label>
<textarea id="textD" readonly></textarea>

https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js

<script>
let dati = [];  // conterrà le righe del foglio Excel

document.getElementById('fileInput').addEventListener('change', function(event) {
    const file = event.target.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        
        const sheet = workbook.Sheets["errori"];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        // Riga 1: titoli
        document.getElementById("labelA").innerText = json[0][0];
        document.getElementById("labelB").innerText = json[0][1];
        document.getElementById("labelC").innerText = json[0][2];
        document.getElementById("labelD").innerText = json[0][3];

        // Righe successive: dati
        dati = json.slice(1);

        // Popola la tendina con colonna A
        const select = document.getElementById("selectA");
        select.innerHTML = "<option value=''>-- seleziona --</option>";

        dati.forEach(riga => {
            if (riga[0]) {
                let opt = document.createElement("option");
                opt.value = riga[0];
                opt.textContent = riga[0];
                select.appendChild(opt);
            }
        });
    };

    reader.readAsArrayBuffer(file);
});

// Quando selezioni una voce mostra B, C, D
document.getElementById("selectA").addEventListener("change", function() {
    const valore = this.value;
    const riga = dati.find(r => r[0] === valore);

    if (riga) {
        document.getElementById("textB").value = riga[1] || "";
        document.getElementById("textC").value = riga[2] || "";
        document.getElementById("textD").value = riga[3] || "";
    }
});
</script>

</body>
</html>

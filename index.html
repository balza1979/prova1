<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ELMI – Errori</title>

<!-- Libreria per leggere Excel (CDN corretto!) -->
<script src="https://cdn.jsdelivr.net/npm/xst/xlsx.full.min.js

<style>
  :root {
    --bg: #d1d5db;
    --primary: #b91c1c;
    --border: #9ca3af;
  }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: Arial, sans-serif;
  }

  header {
    background: var(--primary);
    color: #fff;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .container {
    max-width: 900px;
    margin: 24px auto 40px;
    background: #fff;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
  }

  .row { margin-top: 16px; }

  label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
  }

  select, textarea, input[type="file"] {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 16px;
    box-sizing: border-box;
  }

  /* I CAMPi B-C-D GRANDI */
  textarea.big {
    height: 260px;
    resize: vertical;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 17px;
    padding: 12px;
  }

  .status {
    margin: 12px 0 0;
    color: #374151;
    font-size: 14px;
  }

  .alert {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #7f1d1d;
    padding: 10px 12px;
    border-radius: 8px;
    margin: 12px 0 0;
    display: none;
    white-space: pre-wrap;
  }

  .helper {
    font-size: 13px;
    color: #4b5563;
    margin-top: 6px;
  }
</style>
</head>

<body>

<header>ELMI</header>

<div class="container">

  <div id="alert" class="alert"></div>

  <div class="row">
    <div class="status" id="status">Caricamento di <code>errori.xlsx</code>…</div>
    <div class="helper">Se il caricamento automatico fallisce, puoi selezionare il file qui sotto.</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" />
  </div>

  <!-- CAMPO 1 (tendina) -->
  <div class="row">
    <label id="labelA">Titolo colonna A</label>
    <select id="menu">
      <option value="">— seleziona —</option>
    </select>
  </div>

  <!-- CAMPI GRANDI MULTIRIGA -->
  <div class="row">
    <label id="labelB">Titolo colonna B</label>
    <textarea id="campoB" class="big" readonly></textarea>
  </div>

  <div class="row">
    <label id="labelC">Titolo colonna C</label>
    <textarea id="campoC" class="big" readonly></textarea>
  </div>

  <div class="row">
    <label id="labelD">Titolo colonna D</label>
    <textarea id="campoD" class="big" readonly></textarea>
  </div>

</div>

<script>
(function(){
  let righe = [];

  const qs = id => document.getElementById(id);
  const statusEl = qs('status');
  const alertEl  = qs('alert');
  const menuEl   = qs('menu');

  function showError(msg, err) {
    alertEl.style.display = "block";
    alertEl.textContent = msg + (err ? "\n" + err.message : "");
  }

  function setStatus(msg) { statusEl.textContent = msg; }

  function popolaIntestazioni(intestazioni) {
    qs('labelA').textContent = intestazioni[0];
    qs('labelB').textContent = intestazioni[1];
    qs('labelC').textContent = intestazioni[2];
    qs('labelD').textContent = intestazioni[3];
  }

  function popolaMenu() {
    menuEl.innerHTML = '<option value="">— seleziona —</option>';
    righe.forEach((row, i) => {
      if (row[0]) {
        const op = document.createElement("option");
        op.value = i;
        op.textContent = row[0];
        menuEl.appendChild(op);
      }
    });
  }

  function aggiornaCampi(i) {
    qs('campoB').value = righe[i][1] || "";
    qs('campoC').value = righe[i][2] || "";
    qs('campoD').value = righe[i][3] || "";
  }

  menuEl.addEventListener("change", () => {
    if (menuEl.value === "") {
      qs('campoB').value = "";
      qs('campoC').value = "";
      qs('campoD').value = "";
    } else {
      aggiornaCampi(Number(menuEl.value));
    }
  });

  function parseWorkbook(wb) {
    const sheet = wb.Sheets["errori"];
    if (!sheet) throw new Error("Foglio 'errori' non trovato nel file Excel.");

    const dati = XLSX.utils.sheet_to_json(sheet, { header: 1 });
    const intestazioni = dati[0];
    righe = dati.slice(1);

    popolaIntestazioni(intestazioni);
    popolaMenu();
  }

  async function caricaDaFetch() {
    setStatus("Caricamento di errori.xlsx…");
    const res = await fetch("errori.xlsx");
    if (!res.ok) throw new Error("File non trovato o percorso errato.");
    const buf = await res.arrayBuffer();
    parseWorkbook(XLSX.read(buf, { type: "array" }));
    setStatus("Caricato automaticamente.");
  }

  qs("fileInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      parseWorkbook(XLSX.read(new Uint8Array(ev.target.result), { type: "array" }));
      setStatus("Caricato da file.");
    };
    reader.readAsArrayBuffer(file);
  });

  (async () => {
    try { await caricaDaFetch(); }
    catch(err) {
      showError("Caricamento automatico fallito. Seleziona il file manualmente.", err);
      setStatus("In attesa del file manuale…");
    }
  })();

})();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ELMI – Errori</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Libreria per leggere file Excel -->
https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js

<style>
  body {
    margin: 0;
    padding: 0;
    background: #d1d5db; /* grigio */
    font-family: Arial, sans-serif;
  }

  header {
    background: #b91c1c; /* rosso */
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 20px;
  }

  /* 🔥 UNICA MODIFICA: input più alti con scrollbar */
  select, input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #9ca3af;
    font-size: 16px;

    height: 140px;        /* <-- Aumenta altezza campo */
    overflow-y: auto;     /* <-- Scroll verticale */
    white-space: normal;  /* <-- Vai a capo automatico */
  }
</style>
</head>

<body>

<header>ELMI</header>

<div class="container">
  <label id="labelA">Caricamento...</label>
  <select id="menu"></select>

  <label id="labelB"></label>
  <input type="text" id="campoB" readonly>

  <label id="labelC"></label>
  <input type="text" id="campoC" readonly>

  <label id="labelD"></label>
  <input type="text" id="campoD" readonly>
</div>

<script>
async function caricaExcel() {
  const file = await fetch("errori.xlsx");
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });

  const sheet = workbook.Sheets["errori"];
  const dati = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const intestazioni = dati[0];
  const righe = dati.slice(1);

  document.getElementById("labelA").textContent = intestazioni[0];
  document.getElementById("labelB").textContent = intestazioni[1];
  document.getElementById("labelC").textContent = intestazioni[2];
  document.getElementById("labelD").textContent = intestazioni[3];

  const menu = document.getElementById("menu");

  righe.forEach((riga, index) => {
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = riga[0];
    menu.appendChild(opt);
  });

  menu.addEventListener("change", () => {
    const r = righe[menu.value];
    document.getElementById("campoB").value = r[1] || "";
    document.getElementById("campoC").value = r[2] || "";
    document.getElementById("campoD").value = r[3] || "";
  });

  menu.dispatchEvent(new Event("change"));
}

caricaExcel();
</script>

</body>
</html>

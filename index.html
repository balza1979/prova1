<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>ELMI – Errori</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Libreria per leggere file Excel -->
https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js</script>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #d1d5db; /* grigio */
    font-family: Arial, sans-serif;
  }

  header {
    background: #b91c1c; /* rosso */
    color: white;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
  }

  .container {
    max-width: 800px; /* se vuoi lascia 600px */
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 20px;
  }

  /* Stile base per controlli */
  select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #9ca3af;
    font-size: 16px;
    box-sizing: border-box;
  }

  /* Primo campo: SELECT a 3 righe con scroll */
  #menu {
    /* 'size' nel markup gestisce l'altezza a righe; qui solo rifiniture */
    overflow-y: auto;
  }

  /* Altri 3 campi: TEXTAREA grandi con scroll & a capo */
  #campoB, #campoC, #campoD {
    height: 220px;       /* <-- regola l'altezza che preferisci */
    resize: vertical;    /* l’utente può ingrandire */
    overflow-y: auto;
    white-space: pre-wrap; /* mantiene \n e va a capo */
    background: #f9fafb;
    line-height: 1.35;
  }
</style>
</head>

<body>

<header>ELMI</header>

<div class="container">
  <label id="labelA">Caricamento...</label>
  <!-- 👇 Mostra 3 righe visibili (lista), con scroll se molte voci -->
  <select id="menu" size="3"></select>

  <label id="labelB"></label>
  <textarea id="campoB" readonly></textarea>

  <label id="labelC"></label>
  <textarea id="campoC" readonly></textarea>

  <label id="labelD"></label>
  <textarea id="campoD" readonly></textarea>
</div>

<script>
async function caricaExcel() {
  const file = await fetch("errori.xlsx");
  const arrayBuffer = await file.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });

  const sheet = workbook.Sheets["errori"];
  const dati = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const intestazioni = dati[0];
  const righe = dati.slice(1);

  document.getElementById("labelA").textContent = intestazioni[0];
  document.getElementById("labelB").textContent = intestazioni[1];
  document.getElementById("labelC").textContent = intestazioni[2];
  document.getElementById("labelD").textContent = intestazioni[3];

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  righe.forEach((riga, index) => {
    if (!riga || riga[0] === undefined || riga[0] === null || String(riga[0]).trim() === "") return;
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = riga[0];  // le <option> non vanno a capo: è un limite HTML
    opt.title = riga[0];        // tooltip per leggere il testo completo al passaggio mouse
    menu.appendChild(opt);
  });

  menu.addEventListener("change", () => {
    const r = righe[menu.value];
    document.getElementById("campoB").value = r[1] || "";
    document.getElementById("campoC").value = r[2] || "";
    document.getElementById("campoD").value = r[3] || "";
  });

  // Se ci sono voci, seleziona la prima e popola i campi
  if (menu.options.length > 0) {
    menu.selectedIndex = 0;
    menu.dispatchEvent(new Event("change"));
  }
}

caricaExcel();
</script>

</body>
</html>
